name: Build Backend for ACC

on:
  push:
    branches:
      - acc
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/azure-backend-acc.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: acc
      url: https://acc.api.open-regels.nl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@ronl/shared

      - name: Run linter
        working-directory: packages/backend
        run: npm run lint

      - name: Build TypeScript
        working-directory: packages/backend
        run: npm run build

      - name: Verify build output
        working-directory: packages/backend
        run: |
          test -f dist/index.js || (echo "❌ dist/index.js not found" && exit 1)
          echo "✅ dist/index.js found"

      - name: Prepare deployment package
        working-directory: packages/backend
        run: |
          mkdir -p deploy

          cp -r dist deploy/
          cp package.json deploy/

          # Copy shared package before npm install can overwrite it
          mkdir -p deploy/node_modules/@ronl/shared
          cp -r ../shared/dist deploy/node_modules/@ronl/shared/
          cp ../shared/package.json deploy/node_modules/@ronl/shared/

          # Remove @ronl/shared from package.json so npm install doesn't touch it
          cd deploy
          npm pkg delete dependencies.@ronl/shared
          npm install --production --omit=dev

          echo "[config]" > .deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT = false" >> .deployment

      - name: Create deployment zip
        working-directory: packages/backend
        run: |
          cd deploy
          zip -r ../deployment-acc.zip .
          echo "✅ $(du -sh ../deployment-acc.zip | cut -f1) — deployment-acc.zip"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-acc
          path: packages/backend/deployment-acc.zip
          retention-days: 5
