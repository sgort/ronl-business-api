name: Deploy Backend to Azure ACC

on:
  push:
    branches:
      - acc
    paths:
      - 'packages/backend/**'
      - 'packages/shared/**'
      - '.github/workflows/azure-backend-acc.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: acc
      url: https://acc.api.open-regels.nl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace=@ronl/shared

      - name: Run linter
        working-directory: packages/backend
        run: npm run lint

      - name: Build TypeScript
        working-directory: packages/backend
        run: npm run build

      - name: Verify build output
        working-directory: packages/backend
        run: |
          test -f dist/index.js || (echo "❌ dist/index.js not found" && exit 1)
          echo "✅ dist/index.js found"

      - name: Prepare deployment package
        working-directory: packages/backend
        run: |
          mkdir -p deploy

          cp -r dist deploy/
          cp package.json deploy/

          mkdir -p deploy/node_modules/@ronl
          cp -r ../shared/dist deploy/node_modules/@ronl/shared
          cp ../shared/package.json deploy/node_modules/@ronl/shared/

          cd deploy
          npm install --production --omit=dev

          echo "[config]" > .deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT = false" >> .deployment

      - name: Create deployment zip
        working-directory: packages/backend
        run: |
          cd deploy
          zip -r ../deployment-acc.zip .
          echo "✅ Zip created: $(du -sh ../deployment-acc.zip | cut -f1)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'ronl-business-api-acc'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ACC }}
          package: './packages/backend/deployment-acc.zip'

      - name: Wait for startup
        run: sleep 30

      - name: Health check
        run: |
          for i in {1..5}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" https://acc.api.open-regels.nl/v1/health)
            if [ "$response" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $response, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
